<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor Gantt — Seguimiento de Tareas</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f14;
  --surface:#161920;
  --surface2:#1e222c;
  --surface3:#252a36;
  --border:#2e3340;
  --border2:#3a4055;
  --text:#e8eaf2;
  --text2:#8b90a0;
  --text3:#5a5f70;
  --accent:#4f8ef7;
  --accent2:#2d6be4;
  --green:#2ecc8a;
  --amber:#f5a623;
  --red:#f04f55;
  --purple:#9b6dff;
  --mono:'JetBrains Mono',monospace;
  --sans:'Syne',sans-serif;
  --r:8px;
  --r2:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;overflow-x:hidden}

/* Login */
#loginView{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);position:relative;overflow:hidden}
#loginView::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(79,142,247,.08) 0%,transparent 70%);top:-100px;left:-150px;pointer-events:none}
#loginView::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(155,109,255,.06) 0%,transparent 70%);bottom:-80px;right:-80px;pointer-events:none}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px 40px;width:380px;text-align:center;position:relative;z-index:1}
.login-logo{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);margin-bottom:24px;font-family:var(--mono)}
.login-title{font-size:32px;font-weight:800;margin-bottom:8px;line-height:1.1;background:linear-gradient(135deg,var(--text) 0%,var(--text2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:36px;line-height:1.6}
.login-divider{font-size:11px;color:var(--text3);margin-bottom:20px;letter-spacing:.1em;text-transform:uppercase;font-family:var(--mono)}
.role-btn{width:100%;padding:14px 20px;border-radius:var(--r2);border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .2s;margin-bottom:10px;text-align:left}
.role-btn:hover{border-color:var(--accent);background:var(--surface3);transform:translateY(-1px)}
.role-btn .role-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.role-btn.admin .role-icon{background:rgba(240,79,85,.15);color:var(--red)}
.role-btn.viewer .role-icon{background:rgba(79,142,247,.15);color:var(--accent)}
.role-btn .role-info .role-name{font-weight:700;font-size:14px}
.role-btn .role-info .role-desc{font-size:11px;color:var(--text2);margin-top:2px;font-family:var(--mono)}

/* App shell */
#mainView{display:none;min-height:100vh;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:16px}
.app-name{font-size:15px;font-weight:800;letter-spacing:-.01em}
.app-name span{color:var(--accent)}
.role-chip{font-size:10px;padding:3px 10px;border-radius:20px;font-family:var(--mono);letter-spacing:.05em;text-transform:uppercase;font-weight:500}
.role-chip.admin{background:rgba(240,79,85,.15);color:var(--red);border:1px solid rgba(240,79,85,.3)}
.role-chip.viewer{background:rgba(79,142,247,.15);color:var(--accent);border:1px solid rgba(79,142,247,.3)}
.topbar-right{display:flex;align-items:center;gap:10px}
.icon-btn{background:transparent;border:1px solid var(--border);border-radius:var(--r);padding:6px 12px;color:var(--text2);cursor:pointer;font-family:var(--mono);font-size:12px;transition:all .2s}
.icon-btn:hover{border-color:var(--border2);color:var(--text)}

/* Stats bar */
.stats-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:grid;grid-template-columns:repeat(4,1fr);gap:1px}
.stat-item{text-align:center;padding:8px}
.stat-num{font-size:24px;font-weight:800;font-family:var(--mono);line-height:1}
.stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-top:4px;font-family:var(--mono)}
.stat-item.s-total .stat-num{color:var(--text)}
.stat-item.s-running .stat-num{color:var(--accent)}
.stat-item.s-done .stat-num{color:var(--green)}
.stat-item.s-overdue .stat-num{color:var(--red)}

/* Main content */
.content{padding:20px 24px;flex:1}

/* Tabs */
.tab-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:4px}
.tab{padding:6px 16px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);transition:all .2s;border:none;background:transparent;font-family:var(--sans)}
.tab:hover{color:var(--text)}
.tab.active{background:var(--surface3);color:var(--text);border:1px solid var(--border2)}
.filters{display:flex;gap:8px;flex-wrap:wrap}
select.filt{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:6px 12px;color:var(--text2);font-family:var(--mono);font-size:12px;cursor:pointer;outline:none}
select.filt:focus{border-color:var(--accent)}
#taskCount{font-size:12px;color:var(--text3);font-family:var(--mono);align-self:center}

/* Task cards */
.task-list{display:flex;flex-direction:column;gap:8px}
.task-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px;transition:border-color .2s;position:relative;overflow:hidden}
.task-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.task-card.status-pending::before{background:var(--text3)}
.task-card.status-running::before{background:var(--accent)}
.task-card.status-done::before{background:var(--green)}
.task-card.status-overdue::before{background:var(--red)}
.task-card.is-subtask{margin-left:28px;border-left-color:rgba(79,142,247,.25)}
.task-card.status-done{opacity:.7}
.task-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
.task-name-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.task-name{font-size:15px;font-weight:700}
.chip{font-size:10px;padding:2px 8px;border-radius:10px;font-family:var(--mono);font-weight:500;white-space:nowrap}
.chip-pending{background:rgba(90,95,112,.25);color:var(--text3);border:1px solid var(--border)}
.chip-running{background:rgba(79,142,247,.15);color:var(--accent);border:1px solid rgba(79,142,247,.3)}
.chip-done{background:rgba(46,204,138,.15);color:var(--green);border:1px solid rgba(46,204,138,.3)}
.chip-overdue{background:rgba(240,79,85,.15);color:var(--red);border:1px solid rgba(240,79,85,.3)}
.chip-sub{background:rgba(155,109,255,.15);color:var(--purple);border:1px solid rgba(155,109,255,.3)}
.task-actions{display:flex;gap:6px;flex-shrink:0}
.act-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;font-family:var(--mono);cursor:pointer;transition:all .2s;white-space:nowrap}
.act-btn:hover{border-color:var(--border2);color:var(--text)}
.act-btn.start{border-color:rgba(79,142,247,.4);color:var(--accent)}
.act-btn.start:hover{background:rgba(79,142,247,.1)}
.act-btn.pause{border-color:rgba(245,166,35,.4);color:var(--amber)}
.act-btn.pause:hover{background:rgba(245,166,35,.1)}
.act-btn.finish{border-color:rgba(46,204,138,.4);color:var(--green)}
.act-btn.finish:hover{background:rgba(46,204,138,.1)}
.act-btn.del{border-color:rgba(240,79,85,.3);color:var(--red)}
.act-btn.del:hover{background:rgba(240,79,85,.1)}

.task-meta{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap}
.meta-item{font-size:11px;color:var(--text3);font-family:var(--mono);display:flex;flex-direction:column;gap:2px}
.meta-item .meta-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3)}
.meta-item .meta-val{color:var(--text2)}

.timer-row{display:flex;align-items:center;gap:12px}
.timer-box{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.timer-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);font-family:var(--mono);margin-bottom:4px}
.timer-val{font-family:var(--mono);font-size:22px;font-weight:700;letter-spacing:.05em}
.timer-val.running{color:var(--accent)}
.timer-val.done{color:var(--green)}
.timer-val.overdue{color:var(--red)}
.timer-val.idle{color:var(--text3)}
.progress-wrap{flex:1}
.pct-label{font-size:11px;font-family:var(--mono);color:var(--text2);text-align:right;margin-bottom:4px}
.progress-track{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .5s}

/* Form */
.form-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:24px;max-width:700px}
.form-title{font-size:18px;font-weight:800;margin-bottom:20px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.form-grid.three{grid-template-columns:2fr 1fr 1fr}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);font-family:var(--mono)}
.field input,.field select{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:9px 12px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field select option{background:var(--surface2)}
.form-actions{display:flex;gap:10px;margin-top:4px}
.submit-btn{padding:10px 24px;border-radius:var(--r);background:var(--accent2);border:1px solid var(--accent);color:#fff;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.submit-btn:hover{background:var(--accent);transform:translateY(-1px)}
.cancel-btn{padding:10px 20px;border-radius:var(--r);background:transparent;border:1px solid var(--border);color:var(--text2);font-family:var(--sans);font-size:14px;cursor:pointer;transition:all .2s}
.cancel-btn:hover{border-color:var(--border2);color:var(--text)}
.form-error{font-size:12px;color:var(--red);margin-top:8px;font-family:var(--mono)}
.limit-note{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:10px}

.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:14px;font-family:var(--mono)}

/* Parent line connector */
.task-card.is-subtask::after{content:'';position:absolute;left:-28px;top:24px;width:20px;height:1px;background:var(--border2)}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* Responsive */
@media(max-width:600px){
  .stats-bar{grid-template-columns:repeat(2,1fr)}
  .form-grid{grid-template-columns:1fr}
  .form-grid.three{grid-template-columns:1fr}
  .task-top{flex-direction:column}
  .topbar{padding:0 14px}
  .content{padding:14px}
  .timer-row{flex-direction:column}
}

/* Fade-in */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.task-card{animation:fadeUp .2s ease both}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginView">
  <div class="login-card">
    <div class="login-logo">Sistema de seguimiento</div>
    <div class="login-title">Monitor<br>Gantt</div>
    <div class="login-sub">Cronometraje y seguimiento de tareas en tiempo real con persistencia local.</div>
    <div class="login-divider">Selecciona tu rol</div>
    <button class="role-btn admin" onclick="login('admin')">
      <div class="role-icon">&#9881;</div>
      <div class="role-info">
        <div class="role-name">Administrador</div>
        <div class="role-desc">Agregar · Editar · Controlar</div>
      </div>
    </button>
    <button class="role-btn viewer" onclick="login('viewer')">
      <div class="role-icon">&#128065;</div>
      <div class="role-info">
        <div class="role-name">Visor</div>
        <div class="role-desc">Solo monitoreo · Sin edición</div>
      </div>
    </button>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainView">
  <div class="topbar">
    <div class="topbar-left">
      <div class="app-name">Monitor<span>Gantt</span></div>
      <span class="role-chip" id="roleBadge"></span>
    </div>
    <div class="topbar-right">
      <span style="font-size:11px;color:var(--text3);font-family:var(--mono)" id="clockDisplay"></span>
      <button class="icon-btn" onclick="exportData()">Exportar JSON</button>
      <button class="icon-btn" onclick="clearAll()" id="clearBtn" style="display:none">Limpiar todo</button>
      <button class="icon-btn" onclick="logout()">Salir</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-item s-total"><div class="stat-num" id="sTot">0</div><div class="stat-lbl">Total</div></div>
    <div class="stat-item s-running"><div class="stat-num" id="sRun">0</div><div class="stat-lbl">En curso</div></div>
    <div class="stat-item s-done"><div class="stat-num" id="sDone">0</div><div class="stat-lbl">Finalizadas</div></div>
    <div class="stat-item s-overdue"><div class="stat-num" id="sOver">0</div><div class="stat-lbl">Vencidas</div></div>
  </div>

  <div class="content">
    <div class="tab-row">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <div class="tabs">
          <button class="tab active" onclick="switchTab('monitor')" id="tab-monitor">Monitor</button>
          <button class="tab" onclick="switchTab('add')" id="tab-add" style="display:none">+ Nueva tarea</button>
        </div>
        <div class="filters" id="filterBar">
          <select class="filt" id="filterStatus" onchange="renderTasks()">
            <option value="">Todos los estados</option>
            <option value="pending">Pendiente</option>
            <option value="running">En curso</option>
            <option value="done">Finalizada</option>
            <option value="overdue">Vencida</option>
          </select>
          <select class="filt" id="filterType" onchange="renderTasks()">
            <option value="">Tareas y subtareas</option>
            <option value="task">Solo tareas</option>
            <option value="subtask">Solo subtareas</option>
          </select>
        </div>
      </div>
      <span id="taskCount"></span>
    </div>

    <!-- Monitor panel -->
    <div id="monitorPanel">
      <div class="task-list" id="taskList"></div>
    </div>

    <!-- Add panel -->
    <div id="addPanel" style="display:none">
      <div class="form-panel">
        <div class="form-title">Nueva tarea / subtarea</div>
        <div class="form-grid three">
          <div class="field">
            <label>Nombre de la tarea *</label>
            <input type="text" id="newName" placeholder="Ej: Diseño de interfaz" maxlength="90">
          </div>
          <div class="field">
            <label>Tipo</label>
            <select id="newType" onchange="toggleParent()">
              <option value="task">Tarea principal</option>
              <option value="subtask">Subtarea</option>
            </select>
          </div>
          <div class="field" id="parentField" style="display:none">
            <label>Tarea padre</label>
            <select id="newParent"></select>
          </div>
        </div>
        <div class="form-grid">
          <div class="field">
            <label>Fecha y hora de inicio *</label>
            <input type="datetime-local" id="newStart">
          </div>
          <div class="field">
            <label>Duración (días) *</label>
            <input type="number" id="newDays" min="1" max="365" placeholder="Ej: 5">
          </div>
        </div>
        <div class="form-actions">
          <button class="submit-btn" onclick="addTask()">Agregar tarea</button>
          <button class="cancel-btn" onclick="switchTab('monitor')">Cancelar</button>
        </div>
        <div class="form-error" id="formError"></div>
        <div class="limit-note" id="limitNote"></div>
      </div>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'gantt_monitor_tasks_v2';
let role = null;
let tasks = [];
let tickInterval = null;

/* ─── Auth ─── */
function login(r) {
  role = r;
  loadTasks();
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('mainView').style.display = 'flex';
  document.getElementById('roleBadge').textContent = r === 'admin' ? 'ADMIN' : 'VISOR';
  document.getElementById('roleBadge').className = 'role-chip ' + r;
  if (r === 'admin') {
    document.getElementById('tab-add').style.display = '';
    document.getElementById('clearBtn').style.display = '';
  }
  startTick();
  renderAll();
}

function logout() {
  clearInterval(tickInterval);
  role = null; tasks = [];
  document.getElementById('mainView').style.display = 'none';
  document.getElementById('loginView').style.display = 'flex';
  document.getElementById('tab-add').style.display = 'none';
  document.getElementById('clearBtn').style.display = 'none';
  document.getElementById('roleBadge').className = 'role-chip';
}

/* ─── Storage ─── */
function saveTasks() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); } catch(e) {}
}
function loadTasks() {
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    tasks = d ? JSON.parse(d) : [];
    // Resume running timers from elapsed
    const now = Date.now();
    tasks.forEach(t => {
      if (t.running && t.status !== 'done') {
        // Calculate elapsed since last save
        if (t._savedAt) {
          t.elapsed += Math.floor((now - t._savedAt) / 1000);
        }
        t._savedAt = null;
      }
    });
  } catch(e) { tasks = []; }
}

function saveWithTimestamp() {
  const now = Date.now();
  tasks.forEach(t => { if (t.running) t._savedAt = now; });
  saveTasks();
  tasks.forEach(t => { t._savedAt = null; });
}

window.addEventListener('beforeunload', saveWithTimestamp);

/* ─── Tick ─── */
function startTick() {
  clearInterval(tickInterval);
  tickInterval = setInterval(() => {
    let changed = false;
    tasks.forEach(t => {
      if (t.running && t.status !== 'done') {
        t.elapsed++;
        const end = new Date(t.start).getTime() + t.days * 86400000;
        if (Date.now() > end && t.status !== 'overdue') { t.status = 'overdue'; changed = true; }
        changed = true;
      }
    });
    if (changed) { saveTasks(); renderAll(); }
    updateClock();
  }, 1000);
}

function updateClock() {
  const now = new Date();
  document.getElementById('clockDisplay').textContent = now.toLocaleString('es-SV', {
    day:'2-digit', month:'2-digit', year:'numeric',
    hour:'2-digit', minute:'2-digit', second:'2-digit'
  });
}

/* ─── Task actions ─── */
function addTask() {
  if (tasks.length >= 70) {
    document.getElementById('formError').textContent = 'Límite de 70 tareas alcanzado.'; return;
  }
  const name = document.getElementById('newName').value.trim();
  const type = document.getElementById('newType').value;
  const startVal = document.getElementById('newStart').value;
  const days = parseInt(document.getElementById('newDays').value);
  const parentId = document.getElementById('newParent').value || null;

  if (!name) { document.getElementById('formError').textContent = 'Escribe el nombre de la tarea.'; return; }
  if (!startVal) { document.getElementById('formError').textContent = 'Selecciona la fecha de inicio.'; return; }
  if (!days || days < 1) { document.getElementById('formError').textContent = 'Ingresa la duración en días (mínimo 1).'; return; }
  if (type === 'subtask' && !parentId) { document.getElementById('formError').textContent = 'Selecciona la tarea padre.'; return; }

  const task = {
    id: 'T' + Date.now() + Math.floor(Math.random()*1000),
    name, type, days,
    start: new Date(startVal).toISOString(),
    parent: type === 'subtask' ? parentId : null,
    status: 'pending',
    elapsed: 0,
    running: false,
    createdAt: new Date().toISOString()
  };
  tasks.push(task);
  saveTasks();
  document.getElementById('formError').textContent = '';
  document.getElementById('newName').value = '';
  document.getElementById('newDays').value = '';
  switchTab('monitor');
}

function startTimer(id) {
  const t = tasks.find(x => x.id === id);
  if (!t || t.status === 'done') return;
  t.running = true; t.status = 'running';
  saveTasks(); renderAll();
}
function pauseTimer(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.running = false;
  if (t.status === 'running') t.status = 'pending';
  saveTasks(); renderAll();
}
function markDone(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.running = false; t.status = 'done';
  saveTasks(); renderAll();
}
function deleteTask(id) {
  if (!confirm('¿Eliminar esta tarea y sus subtareas?')) return;
  tasks = tasks.filter(x => x.id !== id && x.parent !== id);
  saveTasks(); renderAll();
}
function clearAll() {
  if (!confirm('¿Eliminar TODAS las tareas? Esta acción no se puede deshacer.')) return;
  tasks = []; saveTasks(); renderAll();
}

/* ─── Helpers ─── */
function fmtSec(sec) {
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('es-SV', {
    day:'2-digit', month:'2-digit', year:'numeric',
    hour:'2-digit', minute:'2-digit'
  });
}
function endDate(t) {
  return new Date(new Date(t.start).getTime() + t.days * 86400000);
}
function totalSec(t) { return t.days * 86400; }
function remaining(t) { return Math.max(0, totalSec(t) - t.elapsed); }
function pct(t) { return Math.min(100, Math.round((t.elapsed / totalSec(t)) * 100)); }

function progressColor(t) {
  if (t.status === 'done') return '#2ecc8a';
  if (t.status === 'overdue') return '#f04f55';
  if (t.status === 'running') return '#4f8ef7';
  return '#3a4055';
}

/* ─── Render ─── */
function renderAll() {
  renderStats();
  renderTasks();
  updateLimitNote();
}

function renderStats() {
  document.getElementById('sTot').textContent = tasks.length;
  document.getElementById('sRun').textContent = tasks.filter(t => t.status === 'running').length;
  document.getElementById('sDone').textContent = tasks.filter(t => t.status === 'done').length;
  document.getElementById('sOver').textContent = tasks.filter(t => t.status === 'overdue').length;
}

function renderTasks() {
  const fs = document.getElementById('filterStatus').value;
  const ft = document.getElementById('filterType').value;
  let list = tasks.filter(t => {
    if (fs && t.status !== fs) return false;
    if (ft && t.type !== ft) return false;
    return true;
  });
  document.getElementById('taskCount').textContent = `${list.length} / ${tasks.length} tareas`;

  if (!list.length) {
    document.getElementById('taskList').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-text">${tasks.length === 0 ? (role==='admin' ? 'No hay tareas. Usa "+ Nueva tarea" para comenzar.' : 'No hay tareas registradas aún.') : 'No hay tareas con ese filtro.'}</div>
      </div>`;
    return;
  }

  const chipMap = { pending:'chip-pending', running:'chip-running', done:'chip-done', overdue:'chip-overdue' };
  const labelMap = { pending:'Pendiente', running:'En curso', done:'Finalizada', overdue:'Vencida' };

  document.getElementById('taskList').innerHTML = list.map((t, i) => {
    const rem = remaining(t);
    const p = pct(t);
    const end = endDate(t);
    const parent = t.type === 'subtask' ? tasks.find(x => x.id === t.parent) : null;
    const timerClass = t.status === 'done' ? 'done' : t.status === 'overdue' ? 'overdue' : t.running ? 'running' : 'idle';
    const timerLbl = t.status === 'done' ? 'Tiempo usado' : 'Tiempo restante';
    const timerVal = t.status === 'done' ? fmtSec(t.elapsed) : fmtSec(rem);

    const adminBtns = role === 'admin' ? `
      ${t.status !== 'done' && !t.running ? `<button class="act-btn start" onclick="startTimer('${t.id}')">▶ Iniciar</button>` : ''}
      ${t.running ? `<button class="act-btn pause" onclick="pauseTimer('${t.id}')">⏸ Pausar</button>` : ''}
      ${t.status !== 'done' ? `<button class="act-btn finish" onclick="markDone('${t.id}')">✓ Finalizar</button>` : ''}
      <button class="act-btn del" onclick="deleteTask('${t.id}')">✕</button>
    ` : '';

    return `<div class="task-card status-${t.status} ${t.type==='subtask'?'is-subtask':''}" style="animation-delay:${i*0.03}s">
      <div class="task-top">
        <div class="task-name-row">
          <span class="task-name">${escHtml(t.name)}</span>
          <span class="chip ${chipMap[t.status]}">${labelMap[t.status]}</span>
          ${t.type==='subtask' ? '<span class="chip chip-sub">Subtarea</span>' : ''}
        </div>
        <div class="task-actions">${adminBtns}</div>
      </div>
      <div class="task-meta">
        <div class="meta-item"><span class="meta-lbl">Inicio</span><span class="meta-val">${fmtDate(t.start)}</span></div>
        <div class="meta-item"><span class="meta-lbl">Fin estimado</span><span class="meta-val">${fmtDate(end.toISOString())}</span></div>
        <div class="meta-item"><span class="meta-lbl">Duración</span><span class="meta-val">${t.days} día(s)</span></div>
        ${parent ? `<div class="meta-item"><span class="meta-lbl">Tarea padre</span><span class="meta-val">${escHtml(parent.name)}</span></div>` : ''}
        <div class="meta-item"><span class="meta-lbl">Progreso</span><span class="meta-val">${p}%</span></div>
      </div>
      <div class="timer-row">
        <div class="timer-box" style="flex:0 0 auto;min-width:200px">
          <div>
            <div class="timer-label">${timerLbl}</div>
            <div class="timer-val ${timerClass}">${timerVal}</div>
          </div>
          <div style="font-size:22px;opacity:.3">${t.running ? '⏱' : t.status==='done' ? '✓' : '○'}</div>
        </div>
        <div class="progress-wrap">
          <div class="pct-label">${p}% completado</div>
          <div class="progress-track"><div class="progress-fill" style="width:${p}%;background:${progressColor(t)}"></div></div>
          ${t.status==='running' ? `<div style="font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:4px">Tiempo activo: ${fmtSec(t.elapsed)}</div>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ─── UI ─── */
function switchTab(tab) {
  ['monitor','add'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    document.getElementById(t+'Panel').style.display = t===tab ? '' : 'none';
  });
  document.getElementById('filterBar').style.display = tab==='monitor' ? '' : 'none';
  document.getElementById('taskCount').style.display = tab==='monitor' ? '' : 'none';
  if (tab === 'add') {
    populateParentSelect();
    const now = new Date(); now.setSeconds(0);
    document.getElementById('newStart').value = now.toISOString().slice(0,16);
    document.getElementById('formError').textContent = '';
    updateLimitNote();
  }
}

function toggleParent() {
  const isSub = document.getElementById('newType').value === 'subtask';
  document.getElementById('parentField').style.display = isSub ? '' : 'none';
}

function populateParentSelect() {
  const sel = document.getElementById('newParent');
  const mainTasks = tasks.filter(t => t.type === 'task');
  sel.innerHTML = mainTasks.length
    ? mainTasks.map(t => `<option value="${t.id}">${escHtml(t.name)}</option>`).join('')
    : '<option value="">— sin tareas principales —</option>';
}

function updateLimitNote() {
  const el = document.getElementById('limitNote');
  if (el) el.textContent = `Tareas registradas: ${tasks.length} / 70`;
}

/* ─── Export ─── */
function exportData() {
  const data = { exportedAt: new Date().toISOString(), tasks };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'gantt-monitor-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}

updateClock();
</script>
